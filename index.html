<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ví Voucher</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
    <div class="max-w-[480px] mx-auto min-h-screen bg-white shadow-xl p-6 flex flex-col justify-center">
        <div id="screen-login">
            <h2 class="text-2xl font-bold mb-6 text-center">Đăng nhập Admin</h2>
            <input type="email" id="input-email" placeholder="Email" class="w-full p-4 mb-4 border rounded-xl">
            <input type="password" id="input-pass" placeholder="Mật khẩu" class="w-full p-4 mb-6 border rounded-xl">
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold">Đăng nhập</button>
        </div>
    </div>

<script>
    async function handleLogin() {
        const email = document.getElementById('input-email').value;
        const password = document.getElementById('input-pass').value;

        try {
            const response = await fetch('https://voucher-backend-nqg2.onrender.com/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (response.ok) {
                alert("Đăng nhập thành công!");
                console.log("Token nhận được:", data.token);
                // Chuyển hướng hoặc ẩn login
            } else {
                // Hiển thị chính xác lỗi từ server
                alert("Lỗi: " + data.message);
            }
        } catch (err) {
            alert("Không thể kết nối tới server. Hãy kiểm tra đường truyền!");
            console.error(err);
        }
    }
</script>
</body>
</html>

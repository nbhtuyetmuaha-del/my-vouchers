<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ví Voucher Cá Nhân</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.0/dist/JsBarcode.all.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        body { background-color: #f3f4f6; }
        .mobile-container {
            max-width: 480px; margin: 0 auto;
            background-color: #ffffff; min-height: 100vh;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            position: relative; overflow-x: hidden;
        }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .tab-active { border-bottom: 2px solid #2563eb; color: #2563eb; font-weight: bold; }
        .tab-inactive { color: #6b7280; font-weight: 600; }
    </style>
</head>
<body>

<div id="qr-reader-dummy" style="display: none;"></div>

<div class="mobile-container flex flex-col">
    <div id="header-bar" class="hidden bg-gray-900 text-white p-4 sticky top-0 z-10 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-bold" id="header-title">Ví Voucher</h1>
        <div class="flex items-center gap-3">
            <button id="btn-back" class="hidden text-sm bg-gray-700 px-3 py-1 rounded">Quay lại</button>
            <button id="btn-user-menu" class="text-2xl focus:outline-none" onclick="toggleUserMenu()">👤</button>
        </div>

        <div id="user-menu-dropdown" class="hidden absolute top-14 right-4 bg-white text-gray-800 rounded-lg shadow-xl border w-56 z-20 overflow-hidden">
            <div class="p-4 border-b bg-gray-50">
                <p class="text-xs text-gray-500 mb-1">Đang đăng nhập với:</p>
                <p class="text-sm font-bold truncate" id="menu-user-email">user@email.com</p>
            </div>
            <div class="p-2 flex flex-col gap-1">
                <button id="btn-admin-panel" class="hidden w-full text-left px-4 py-2 text-blue-600 font-semibold hover:bg-blue-50 rounded transition" onclick="showScreen('screen-admin')">⚙️ Admin Dashboard</button>
                <button id="btn-logout" class="w-full text-left px-4 py-2 text-red-600 font-semibold hover:bg-red-50 rounded transition">🚪 Đăng xuất ngay</button>
            </div>
        </div>
    </div>

    <div id="screen-login" class="flex-1 flex flex-col items-center justify-center p-6 bg-gray-900 text-white">
        <div class="bg-white p-6 rounded-2xl shadow-xl w-full text-gray-900 text-center relative overflow-hidden">
            <h2 id="login-title" class="text-2xl font-bold mb-2">Đăng Nhập</h2>
            <p id="login-desc" class="text-sm text-gray-500 mb-6">Hệ thống quản lý nội bộ.</p>
            
            <input type="email" id="input-email" placeholder="Email" class="w-full border-b-2 border-gray-300 focus:border-blue-500 outline-none p-2 mb-4 text-center">
            <input type="password" id="input-pass" placeholder="Mật khẩu" class="w-full border-b-2 border-gray-300 focus:border-blue-500 outline-none p-2 mb-6 text-center">
            
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition">Đăng Nhập</button>
            <p id="login-error" class="text-red-500 text-sm mt-3 hidden"></p>
        </div>
    </div>

    <div id="screen-list" class="hidden flex-1 p-0 overflow-y-auto pb-24 bg-gray-50">
        <div class="flex bg-white border-b sticky top-0 z-0">
            <button id="tab-active" class="flex-1 py-3 text-center tab-active transition" onclick="switchTab('active')">Chưa dùng <span id="count-active" class="ml-1 text-xs bg-blue-100 text-blue-600 py-0.5 px-2 rounded-full">0</span></button>
            <button id="tab-used" class="flex-1 py-3 text-center tab-inactive transition" onclick="switchTab('used')">Đã dùng <span id="count-used" class="ml-1 text-xs bg-gray-200 text-gray-600 py-0.5 px-2 rounded-full">0</span></button>
        </div>

        <div class="p-4">
            <select id="filter-category" class="w-full text-sm border rounded p-2 mb-4 bg-white" onchange="renderVouchers()">
                <option value="all">Tất cả thương hiệu</option>
                <option value="Katinat">Katinat</option>
                <option value="Shopee">Shopee</option>
                <option value="Khác">Khác</option>
            </select>
            <div id="voucher-list" class="space-y-3"></div>
        </div>
        
        <button onclick="showScreen('screen-add')" class="fixed bottom-6 right-6 md:right-[calc(50%-210px)] bg-blue-600 text-white w-14 h-14 rounded-full shadow-lg text-3xl flex items-center justify-center hover:bg-blue-700 transition z-10">+</button>
    </div>

    <div id="screen-add" class="hidden flex-1 p-4 bg-gray-50">
        <div class="space-y-4">
            <div>
                <label class="block text-sm text-gray-600 mb-1">Mã Voucher</label>
                <div class="flex relative">
                    <input type="text" id="input-code" placeholder="VD: KATINAT123" class="flex-1 border rounded p-2 w-full uppercase pr-12">
                    <button type="button" onclick="document.getElementById('upload-qr').click()" class="absolute right-0 top-0 h-full px-3 text-gray-600 bg-gray-200 hover:bg-gray-300 border border-l-0 rounded-r transition">📷</button>
                </div>
                <input type="file" id="upload-qr" accept="image/*" class="hidden" onchange="scanImage(event)">
                <p id="scan-status" class="text-xs mt-1 hidden"></p>
            </div>
            <div>
                <label class="block text-sm text-gray-600 mb-1">Phân loại</label>
                <select id="input-category" class="w-full border rounded p-2">
                    <option value="Katinat">Katinat</option>
                    <option value="Shopee">Shopee</option>
                    <option value="Khác">Khác</option>
                </select>
            </div>
            <div>
                <label class="block text-sm text-gray-600 mb-1">Ngày hết hạn</label>
                <input type="date" id="input-expiry" class="w-full border rounded p-2">
            </div>
            <button onclick="addVoucher()" class="w-full bg-gray-900 text-white p-3 rounded font-bold mt-4">Lưu Voucher</button>
        </div>
    </div>

    <div id="screen-detail" class="hidden flex-1 p-0 bg-white flex flex-col">
        <div class="bg-gray-50 p-6 flex flex-col items-center border-b flex-1 relative">
            <span id="detail-category" class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-2"></span>
            <div id="stamp-used" class="hidden absolute top-10 transform -rotate-12 border-4 border-red-500 text-red-500 font-bold text-3xl p-2 rounded uppercase opacity-80 z-20 pointer-events-none">Đã Sử Dụng</div>
            <div id="qrcode" class="mb-4 bg-white p-2 rounded shadow-sm"></div>
            <svg id="barcode" class="mb-2 max-w-full"></svg>
            <p id="detail-code" class="text-2xl font-mono font-bold tracking-widest text-gray-800"></p>
            <p id="detail-expiry" class="text-sm text-gray-500 mt-2 font-medium"></p>
            <button id="btn-mark-used" class="mt-6 bg-red-100 text-red-600 border border-red-300 px-4 py-2 rounded font-bold w-full active:bg-red-200">Đánh dấu đã sử dụng</button>
        </div>
    </div>

    <div id="screen-admin" class="hidden flex-1 p-4 bg-gray-100 overflow-y-auto">
        <h2 class="font-bold text-xl mb-4 text-gray-800">Quản Lý Toàn Bộ Voucher</h2>
        <div class="bg-blue-100 text-blue-800 p-3 rounded mb-4 text-sm">
            <b>Lưu ý:</b> Tính năng Thêm/Sửa/Xóa User vui lòng thực hiện trên <a href="https://console.firebase.google.com/" target="_blank" class="underline font-bold">Firebase Console</a>.
        </div>
        <div class="flex gap-2 mb-4">
            <input type="text" id="admin-search" placeholder="Nhập mã cần tìm..." class="flex-1 border p-2 rounded text-sm">
            <button onclick="loadAllVouchersAdmin()" class="bg-gray-800 text-white px-3 py-2 rounded text-sm">Tìm kiếm</button>
        </div>
        <div id="admin-voucher-list" class="space-y-2 text-sm">
            <p class="text-center text-gray-500 mt-4">Bấm tìm kiếm để tải dữ liệu...</p>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, updateDoc, doc, deleteDoc, collectionGroup, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // 🔴 1. EMAIL ADMIN ĐÃ ĐƯỢC TÍCH HỢP 🔴
    const ADMIN_EMAIL = "admin@admin.com";

    // 🔴 2. FIREBASE CONFIG ĐÃ ĐƯỢC TÍCH HỢP 🔴
    const firebaseConfig = {
      apiKey: "AIzaSyD7Eup9NymCmiSL8156zBOwoH6Q8ZVOGq0",
      authDomain: "vi-voucher-app.firebaseapp.com",
      projectId: "vi-voucher-app",
      storageBucket: "vi-voucher-app.firebasestorage.app",
      messagingSenderId: "897386519118",
      appId: "1:897386519118:web:84110f2d328e573e41811f",
      measurementId: "G-3NYRHQFCS8"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let vouchers = [];
    let currentVoucherId = null;
    let currentUser = null;
    let currentTab = 'active'; 
    const screens = ['screen-login', 'screen-list', 'screen-add', 'screen-detail', 'screen-admin'];

    // QUÉT MÃ TỪ ẢNH
    window.scanImage = function(event) {
        const file = event.target.files[0];
        if (!file) return;
        const statusEl = document.getElementById('scan-status');
        statusEl.className = "text-xs mt-1 text-blue-600 font-medium";
        statusEl.innerText = "⏳ Đang phân tích ảnh...";
        statusEl.classList.remove('hidden');

        const html5QrCode = new Html5Qrcode("qr-reader-dummy");
        html5QrCode.scanFile(file, true)
        .then(decodedText => {
            document.getElementById('input-code').value = decodedText.toUpperCase();
            statusEl.className = "text-xs mt-1 text-green-600 font-bold";
            statusEl.innerText = "✅ Quét thành công!";
            setTimeout(() => statusEl.classList.add('hidden'), 3000);
        }).catch(err => {
            statusEl.className = "text-xs mt-1 text-red-500 font-medium";
            statusEl.innerText = "❌ Không tìm thấy mã hợp lệ.";
        });
        event.target.value = ''; 
    };

    // UI CONTROL
    window.toggleUserMenu = function() { document.getElementById('user-menu-dropdown').classList.toggle('hidden'); };
    document.addEventListener('click', (event) => {
        const menu = document.getElementById('user-menu-dropdown');
        const btn = document.getElementById('btn-user-menu');
        if (menu && btn && !btn.contains(event.target) && !menu.contains(event.target)) menu.classList.add('hidden');
    });

    document.getElementById('btn-logout').onclick = () => {
        document.getElementById('user-menu-dropdown').classList.add('hidden');
        signOut(auth);
    };

    window.showScreen = function(screenId) {
        document.getElementById('user-menu-dropdown').classList.add('hidden');
        screens.forEach(id => document.getElementById(id).classList.add('hidden'));
        document.getElementById(screenId).classList.remove('hidden');
        
        const btnBack = document.getElementById('btn-back');
        if (screenId === 'screen-list') {
            btnBack.classList.add('hidden');
            document.getElementById('header-title').innerText = 'Ví Voucher';
            renderVouchers();
        } else if (screenId !== 'screen-login') {
            btnBack.classList.remove('hidden');
            btnBack.onclick = () => showScreen('screen-list');
            if (screenId === 'screen-add') document.getElementById('header-title').innerText = 'Thêm mới';
            else if (screenId === 'screen-detail') document.getElementById('header-title').innerText = 'Chi tiết';
            else if (screenId === 'screen-admin') document.getElementById('header-title').innerText = 'Admin Dashboard';
        }
    };

    // XỬ LÝ TAB (CHƯA DÙNG / ĐÃ DÙNG)
    window.switchTab = function(tabName) {
        currentTab = tabName;
        if(tabName === 'active') {
            document.getElementById('tab-active').className = "flex-1 py-3 text-center tab-active transition";
            document.getElementById('tab-used').className = "flex-1 py-3 text-center tab-inactive transition";
        } else {
            document.getElementById('tab-active').className = "flex-1 py-3 text-center tab-inactive transition";
            document.getElementById('tab-used').className = "flex-1 py-3 text-center tab-active transition";
        }
        renderVouchers();
    }

    // ĐĂNG NHẬP (KHÔNG CHO PHÉP ĐĂNG KÝ)
    window.handleLogin = async function() {
        const email = document.getElementById('input-email').value;
        const pass = document.getElementById('input-pass').value;
        const errorEl = document.getElementById('login-error');
        if (!email || !pass) { errorEl.innerText = "Điền đầy đủ thông tin."; errorEl.classList.remove('hidden'); return; }
        try {
            await signInWithEmailAndPassword(auth, email, pass);
        } catch (error) {
            errorEl.innerText = "Sai thông tin hoặc tài khoản không tồn tại."; errorEl.classList.remove('hidden');
        }
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            document.getElementById('header-bar').classList.remove('hidden');
            document.getElementById('menu-user-email').innerText = user.email;
            
            // Xử lý hiển thị nút Admin Dashboard
            if(user.email === ADMIN_EMAIL) {
                document.getElementById('btn-admin-panel').classList.remove('hidden');
            } else {
                document.getElementById('btn-admin-panel').classList.add('hidden');
            }

            loadDataFromFirebase();
            showScreen('screen-list');
        } else {
            currentUser = null;
            document.getElementById('header-bar').classList.add('hidden');
            showScreen('screen-login');
        }
    });

    // FIRESTORE: LOAD DỮ LIỆU CÁ NHÂN
    async function loadDataFromFirebase() {
        if (!currentUser) return;
        vouchers = []; 
        const querySnapshot = await getDocs(collection(db, `users/${currentUser.uid}/vouchers`));
        querySnapshot.forEach((doc) => { vouchers.push({ id: doc.id, ...doc.data() }); });
        renderVouchers();
    }

    // FIRESTORE: THÊM MÃ VÀ KIỂM TRA TRÙNG LẶP
    window.addVoucher = async function() {
        const code = document.getElementById('input-code').value.toUpperCase().trim();
        const category = document.getElementById('input-category').value;
        const expiry = document.getElementById('input-expiry').value;
        if (!code || !expiry) { alert("Vui lòng nhập đủ thông tin!"); return; }

        // CHECK TRÙNG MÃ
        const isDuplicate = vouchers.some(v => v.code === code);
        if (isDuplicate) {
            alert(`Mã "${code}" đã tồn tại trong ví của bạn! Vui lòng kiểm tra lại.`);
            return;
        }

        const newVoucher = { code, category, expiry, status: 'active', createdAt: Date.now() };
        const docRef = await addDoc(collection(db, `users/${currentUser.uid}/vouchers`), newVoucher);
        vouchers.push({ id: docRef.id, ...newVoucher });
        
        document.getElementById('input-code').value = '';
        document.getElementById('input-expiry').value = '';
        currentTab = 'active'; 
        switchTab('active');
        showScreen('screen-list');
    };

    // RENDER DANH SÁCH VÀ ĐẾM SỐ LƯỢNG
    window.renderVouchers = function() {
        const listEl = document.getElementById('voucher-list');
        const filter = document.getElementById('filter-category').value;
        listEl.innerHTML = '';

        const activeCount = vouchers.filter(v => v.status === 'active').length;
        const usedCount = vouchers.filter(v => v.status === 'used').length;
        document.getElementById('count-active').innerText = activeCount;
        document.getElementById('count-used').innerText = usedCount;

        let filtered = vouchers.filter(v => v.status === currentTab);
        if(filter !== 'all') filtered = filtered.filter(v => v.category === filter);

        if (filtered.length === 0) {
            listEl.innerHTML = '<p class="text-center text-gray-500 mt-10">Không có voucher nào trong mục này.</p>'; return;
        }

        [...filtered].sort((a,b) => b.createdAt - a.createdAt).forEach(v => {
            const div = document.createElement('div');
            div.className = `p-4 rounded-lg shadow-sm border bg-white flex justify-between items-center cursor-pointer active:bg-gray-50`;
            div.onclick = () => window.showDetail(v);
            div.innerHTML = `
                <div>
                    <div class="flex items-center gap-2">
                        <span class="text-xs font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded uppercase">${v.category}</span>
                    </div>
                    <p class="font-mono font-bold text-gray-800 mt-2">${v.code}</p>
                    <p class="text-xs text-gray-500 mt-1">HSD: ${v.expiry}</p>
                </div>
            `;
            listEl.appendChild(div);
        });
    };

    // XEM CHI TIẾT
    window.showDetail = function(voucher) {
        currentVoucherId = voucher.id;
        showScreen('screen-detail');
        document.getElementById('detail-category').innerText = voucher.category;
        document.getElementById('detail-code').innerText = voucher.code;
        document.getElementById('detail-expiry').innerText = 'HSD: ' + voucher.expiry;
        document.getElementById('qrcode').innerHTML = '';
        document.getElementById('barcode').innerHTML = '';
        
        const btnMarkUsed = document.getElementById('btn-mark-used');
        const stampUsed = document.getElementById('stamp-used');
        
        if (voucher.status === 'used') {
            stampUsed.classList.remove('hidden'); btnMarkUsed.classList.add('hidden');
            document.getElementById('qrcode').classList.add('opacity-30');
        } else {
            stampUsed.classList.add('hidden'); btnMarkUsed.classList.remove('hidden');
            document.getElementById('qrcode').classList.remove('opacity-30');
            new QRCode(document.getElementById('qrcode'), { text: voucher.code, width: 150, height: 150 });
            JsBarcode("#barcode", voucher.code, { format: "CODE128", width: 2, height: 60, displayValue: false });
        }

        btnMarkUsed.onclick = async function() {
            if(confirm("Xác nhận đã sử dụng? (Sẽ chuyển sang mục Đã dùng)")) {
                const voucherRef = doc(db, `users/${currentUser.uid}/vouchers`, currentVoucherId);
                await updateDoc(voucherRef, { status: 'used' }); 
                const index = vouchers.findIndex(v => v.id === currentVoucherId);
                if (index !== -1) vouchers[index].status = 'used'; 
                window.showDetail(vouchers[index]);
            }
        };
    };

    // TÍNH NĂNG ADMIN DASHBOARD
    window.loadAllVouchersAdmin = async function() {
        if(currentUser.email !== ADMIN_EMAIL) {
            alert("Bạn không có quyền truy cập chức năng này."); return;
        }

        const keyword = document.getElementById('admin-search').value.toUpperCase().trim();
        const listEl = document.getElementById('admin-voucher-list');
        listEl.innerHTML = '<p class="text-center">Đang tải dữ liệu toàn hệ thống...</p>';

        try {
            const vouchersQuery = query(collectionGroup(db, 'vouchers'));
            const querySnapshot = await getDocs(vouchersQuery);
            
            let allSysVouchers = [];
            querySnapshot.forEach((doc) => {
                const userId = doc.ref.parent.parent.id;
                allSysVouchers.push({ id: doc.id, userId: userId, ...doc.data() });
            });

            if(keyword !== "") {
                allSysVouchers = allSysVouchers.filter(v => v.code.includes(keyword));
            }

            listEl.innerHTML = '';
            if(allSysVouchers.length === 0) {
                listEl.innerHTML = '<p class="text-center text-red-500">Không tìm thấy mã nào.</p>';
                return;
            }

            allSysVouchers.sort((a,b) => b.createdAt - a.createdAt).forEach(v => {
                const div = document.createElement('div');
                div.className = "p-3 bg-white border rounded shadow-sm flex justify-between items-center";
                div.innerHTML = `
                    <div>
                        <p class="font-bold font-mono text-blue-700">${v.code} <span class="text-xs text-gray-400">(${v.status})</span></p>
                        <p class="text-xs text-gray-500">Thuộc ID: ${v.userId.substring(0, 8)}...</p>
                    </div>
                    <button onclick="deleteGlobalVoucher('${v.userId}', '${v.id}')" class="bg-red-500 text-white px-2 py-1 rounded text-xs">Xóa mã</button>
                `;
                listEl.appendChild(div);
            });

        } catch (error) {
            console.error(error);
            listEl.innerHTML = '<p class="text-center text-red-500">Lỗi lấy dữ liệu! (Hãy chắc chắn bạn đã cập nhật Firestore Rules cho Admin).</p>';
        }
    };

    window.deleteGlobalVoucher = async function(userId, voucherId) {
        if(confirm("Bạn có chắc chắn muốn XÓA VĨNH VIỄN mã này khỏi tài khoản của khách?")) {
            try {
                await deleteDoc(doc(db, `users/${userId}/vouchers`, voucherId));
                alert("Đã xóa thành công!");
                loadAllVouchersAdmin(); 
            } catch(e) {
                alert("Lỗi khi xóa: " + e.message);
            }
        }
    };

</script>
</body>
</html>

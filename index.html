<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ví Voucher Chuyên Nghiệp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.0/dist/JsBarcode.all.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .mobile-container {
            max-width: 480px; margin: 0 auto;
            background-color: #ffffff; min-height: 100vh;
            box-shadow: 0 0 40px rgba(0,0,0,0.05);
            position: relative; overflow-x: hidden;
        }
        /* Hiệu ứng kính mờ cho header */
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .btn-active:active { transform: scale(0.98); }
        .watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-45deg); color: rgba(200, 200, 200, 0.2); font-size: 18px; font-weight: bold; pointer-events: none; z-index: 10; white-space: nowrap; }
    </style>
</head>
<body>

<div id="security-blur" class="fixed inset-0 z-[9999] bg-white/95 backdrop-blur-lg hidden flex-col items-center justify-center">
    <p class="text-xl font-bold text-slate-800">🔒 Ứng dụng đã khóa</p>
</div>

<div class="mobile-container flex flex-col">
    <!-- HEADER -->
    <div id="header-bar" class="hidden glass sticky top-0 z-10 border-b border-slate-100 p-4 flex justify-between items-center">
        <h1 class="text-lg font-bold text-slate-800" id="header-title">Ví Voucher</h1>
        <button onclick="toggleUserMenu()" class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-xl">👤</button>
    </div>

    <!-- MÀN HÌNH 0: ĐĂNG NHẬP (Thiết kế hiện đại) -->
    <div id="screen-login" class="flex-1 flex flex-col items-center justify-center p-6 bg-slate-900 text-white">
        <div class="w-full max-w-sm space-y-6">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-bold">Chào mừng trở lại</h2>
                <p class="text-slate-400 mt-2">Đăng nhập để xem voucher của bạn</p>
            </div>
            <div class="space-y-4">
                <input type="email" id="input-email" placeholder="Email đăng nhập" class="w-full bg-slate-800 border border-slate-700 p-4 rounded-2xl outline-none focus:border-blue-500 transition">
                <input type="password" id="input-pass" placeholder="Mật khẩu" class="w-full bg-slate-800 border border-slate-700 p-4 rounded-2xl outline-none focus:border-blue-500 transition">
            </div>
            <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl transition btn-active">Đăng Nhập</button>
        </div>
    </div>

    <!-- MÀN HÌNH 1: DANH SÁCH -->
    <div id="screen-list" class="hidden flex-1 p-4 pb-24 bg-slate-50">
        <div class="flex bg-slate-200 p-1 rounded-2xl mb-6">
            <button id="tab-active" class="flex-1 py-2 text-sm rounded-xl font-semibold bg-white shadow-sm" onclick="switchTab('active')">Chưa dùng</button>
            <button id="tab-used" class="flex-1 py-2 text-sm rounded-xl font-semibold text-slate-500" onclick="switchTab('used')">Đã dùng</button>
        </div>
        <div id="voucher-list" class="space-y-4"></div>
    </div>

    <!-- MÀN HÌNH CHI TIẾT -->
    <div id="screen-detail" class="hidden flex-1 bg-white flex flex-col">
        <div id="user-watermark" class="watermark"></div>
        <div class="p-6 flex flex-col items-center flex-1 justify-center">
            <div id="qrcode" class="p-4 bg-white rounded-3xl shadow-xl border border-slate-100"></div>
            <div class="mt-6 text-center">
                <p id="detail-code" class="text-3xl font-mono font-bold tracking-widest text-slate-900"></p>
                <p id="detail-category" class="text-sm font-semibold text-blue-600 mt-1 uppercase"></p>
            </div>
        </div>
        <div id="katinat-terms" class="p-6 bg-slate-50 rounded-t-3xl text-sm text-slate-600 space-y-2">
            <h3 class="font-bold text-slate-800">Hướng dẫn sử dụng</h3>
            <p>Vui lòng đưa mã này cho thu ngân tại quầy.</p>
        </div>
    </div>

    <!-- MÀN HÌNH ADMIN -->
    <div id="screen-admin" class="hidden flex-1 p-4 bg-slate-50 overflow-y-auto">
        <!-- Dashboard Content Here (giữ nguyên logic cũ nhưng thêm class tailwind để đẹp hơn) -->
        <div id="admin-voucher-list" class="space-y-3 mt-4"></div>
    </div>
</div>

<script>
    // [Giữ nguyên toàn bộ script logic cũ của bạn tại đây để đảm bảo chạy đúng]
    // ... logic loadDataFromBackend, addVoucherAdmin, v.v ...
</script>
</body>
</html>

<script type="module">
    // 1. NHÚNG THƯ VIỆN FIREBASE (Phiên bản Modular v10)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // 2. ĐIỀN FIREBASE CONFIG CỦA BẠN VÀO ĐÂY
    const firebaseConfig = {
  apiKey: "AIzaSyD7Eup9NymCmiSL8156zBOwoH6Q8ZVOGq0",
  authDomain: "vi-voucher-app.firebaseapp.com",
  projectId: "vi-voucher-app",
  storageBucket: "vi-voucher-app.firebasestorage.app",
  messagingSenderId: "897386519118",
  appId: "1:897386519118:web:84110f2d328e573e41811f",
  measurementId: "G-3NYRHQFCS8"
    };

    // Khởi tạo Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Biến toàn cục
    let vouchers = [];
    let currentVoucherId = null;
    let currentUser = null;
    const screens = ['screen-login', 'screen-list', 'screen-add', 'screen-detail'];

    // --- SỬA LẠI GIAO DIỆN ĐĂNG NHẬP ---
    // Đổi input type="password" thành Email & Thêm input Password
    document.getElementById('input-pin').outerHTML = `
        <input type="email" id="input-email" placeholder="Email" class="w-full border-b-2 border-gray-300 focus:border-blue-500 outline-none p-2 mb-4 text-center">
        <input type="password" id="input-pass" placeholder="Mật khẩu (từ 6 ký tự)" class="w-full border-b-2 border-gray-300 focus:border-blue-500 outline-none p-2 mb-6 text-center">
    `;
    document.getElementById('login-title').innerText = "Đăng Nhập / Đăng Ký";
    document.getElementById('login-desc').innerText = "Nếu email chưa có hệ thống sẽ tự đăng ký.";
    // Thêm nút Đăng xuất vào Header
    document.getElementById('header-title').outerHTML += `<button id="btn-logout" class="text-xs bg-red-600 px-2 py-1 rounded">Đăng xuất</button>`;


    // 3. XỬ LÝ ĐĂNG NHẬP / ĐĂNG KÝ
    window.handleLogin = async function() {
        const email = document.getElementById('input-email').value;
        const pass = document.getElementById('input-pass').value;
        const errorEl = document.getElementById('login-error');
        
        if (!email || pass.length < 6) {
            errorEl.innerText = "Email không hợp lệ hoặc pass < 6 ký tự";
            errorEl.classList.remove('hidden'); return;
        }

        try {
            // Thử đăng nhập trước
            await signInWithEmailAndPassword(auth, email, pass);
        } catch (error) {
            // Nếu lỗi do chưa có tài khoản -> Tự động đăng ký
            if (error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential') {
                try {
                    await createUserWithEmailAndPassword(auth, email, pass);
                } catch (regError) {
                    errorEl.innerText = regError.message;
                    errorEl.classList.remove('hidden');
                }
            } else {
                errorEl.innerText = "Sai mật khẩu hoặc lỗi mạng!";
                errorEl.classList.remove('hidden');
            }
        }
    };

    // Theo dõi trạng thái đăng nhập
    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            document.getElementById('header-bar').classList.remove('hidden');
            loadDataFromFirebase();
            showScreen('screen-list');
        } else {
            currentUser = null;
            document.getElementById('header-bar').classList.add('hidden');
            showScreen('screen-login');
        }
    });

    document.getElementById('btn-logout').onclick = () => signOut(auth);

    // 4. LÀM VIỆC VỚI DATABASE FIREBASE
    async function loadDataFromFirebase() {
        if (!currentUser) return;
        vouchers = []; // Xóa data cũ
        const querySnapshot = await getDocs(collection(db, `users/${currentUser.uid}/vouchers`));
        querySnapshot.forEach((doc) => {
            vouchers.push({ id: doc.id, ...doc.data() });
        });
        renderVouchers();
    }

    window.addVoucher = async function() {
        const code = document.getElementById('input-code').value.toUpperCase();
        const category = document.getElementById('input-category').value;
        const expiry = document.getElementById('input-expiry').value;

        if (!code || !expiry) { alert("Vui lòng nhập đủ thông tin!"); return; }

        const newVoucher = { code, category, expiry, status: 'active', createdAt: Date.now() };
        
        // Lưu lên Firebase
        const docRef = await addDoc(collection(db, `users/${currentUser.uid}/vouchers`), newVoucher);
        
        // Cập nhật giao diện
        vouchers.push({ id: docRef.id, ...newVoucher });
        document.getElementById('input-code').value = '';
        document.getElementById('input-expiry').value = '';
        showScreen('screen-list');
    };

    // 5. CÁC HÀM UI CŨ (Giữ nguyên nhưng bọc vào window để HTML gọi được)
    window.showScreen = function(screenId) {
        screens.forEach(id => document.getElementById(id).classList.add('hidden'));
        document.getElementById(screenId).classList.remove('hidden');
        const btnBack = document.getElementById('btn-back');
        if (screenId === 'screen-list') {
            btnBack.classList.add('hidden');
            document.getElementById('header-title').innerText = 'Ví Voucher';
            renderVouchers();
        } else if (screenId !== 'screen-login') {
            btnBack.classList.remove('hidden');
            btnBack.onclick = () => showScreen('screen-list');
            document.getElementById('header-title').innerText = screenId === 'screen-add' ? 'Thêm mới' : 'Chi tiết mã';
        }
    };

    window.renderVouchers = function() {
        const listEl = document.getElementById('voucher-list');
        const filter = document.getElementById('filter-category') ? document.getElementById('filter-category').value : 'all';
        listEl.innerHTML = '';
        const filtered = filter === 'all' ? vouchers : vouchers.filter(v => v.category === filter);

        if (filtered.length === 0) {
            listEl.innerHTML = '<p class="text-center text-gray-500 mt-10">Không có voucher nào.</p>'; return;
        }

        // Sắp xếp theo ngày tạo mới nhất
        [...filtered].sort((a,b) => b.createdAt - a.createdAt).forEach(v => {
            const isUsed = v.status === 'used';
            const div = document.createElement('div');
            div.className = `p-4 rounded-lg shadow-sm border flex justify-between items-center cursor-pointer ${isUsed ? 'bg-gray-100 opacity-60' : 'bg-white active:bg-gray-50'}`;
            div.onclick = () => window.showDetail(v);
            div.innerHTML = `
                <div>
                    <div class="flex items-center gap-2">
                        <span class="text-xs font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded uppercase">${v.category}</span>
                        ${isUsed ? '<span class="text-xs font-bold text-red-500 border border-red-500 px-1 rounded">ĐÃ DÙNG</span>' : ''}
                    </div>
                    <p class="font-mono font-bold ${isUsed ? 'text-gray-500 line-through' : 'text-gray-800'} mt-2">${v.code}</p>
                    <p class="text-xs text-gray-500 mt-1">HSD: ${v.expiry}</p>
                </div>
            `;
            listEl.appendChild(div);
        });
    };

    window.showDetail = function(voucher) {
        currentVoucherId = voucher.id;
        showScreen('screen-detail');
        document.getElementById('detail-category').innerText = voucher.category;
        document.getElementById('detail-code').innerText = voucher.code;
        document.getElementById('detail-expiry').innerText = 'HSD: ' + voucher.expiry;
        
        document.getElementById('qrcode').innerHTML = '';
        document.getElementById('barcode').innerHTML = '';
        
        const btnMarkUsed = document.getElementById('btn-mark-used');
        const stampUsed = document.getElementById('stamp-used');
        
        if (voucher.status === 'used') {
            stampUsed.classList.remove('hidden'); btnMarkUsed.classList.add('hidden');
            document.getElementById('qrcode').classList.add('opacity-30');
        } else {
            stampUsed.classList.add('hidden'); btnMarkUsed.classList.remove('hidden');
            document.getElementById('qrcode').classList.remove('opacity-30');
            new QRCode(document.getElementById('qrcode'), { text: voucher.code, width: 150, height: 150 });
            JsBarcode("#barcode", voucher.code, { format: "CODE128", width: 2, height: 60, displayValue: false });
        }

        // Sự kiện cập nhật trạng thái lên Database
        btnMarkUsed.onclick = async function() {
            if(confirm("Bạn có chắc chắn đã sử dụng mã này?")) {
                const voucherRef = doc(db, `users/${currentUser.uid}/vouchers`, currentVoucherId);
                await updateDoc(voucherRef, { status: 'used' }); // Cập nhật Firebase
                
                const index = vouchers.findIndex(v => v.id === currentVoucherId);
                if (index !== -1) vouchers[index].status = 'used'; // Cập nhật RAM
                window.showDetail(vouchers[index]);
            }
        };
        document.getElementById('katinat-terms').classList.toggle('hidden', voucher.category !== 'Katinat');
    };
</script>

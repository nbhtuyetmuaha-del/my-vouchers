<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ví Voucher Cá Nhân</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.0/dist/JsBarcode.all.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        body { background-color: #f3f4f6; }
        .mobile-container {
            max-width: 480px; margin: 0 auto;
            background-color: #ffffff; min-height: 100vh;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            position: relative; overflow-x: hidden;
        }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .tab-active { border-bottom: 2px solid #2563eb; color: #2563eb; font-weight: bold; }
        .tab-inactive { color: #6b7280; font-weight: 600; }
    </style>
</head>
<body>

<div id="qr-reader-dummy" style="display: none;"></div>

<div class="mobile-container flex flex-col">
    <div id="header-bar" class="hidden bg-gray-900 text-white p-4 sticky top-0 z-10 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-bold" id="header-title">Ví Voucher</h1>
        <div class="flex items-center gap-3">
            <button id="btn-back" class="hidden text-sm bg-gray-700 px-3 py-1 rounded">Quay lại</button>
            <button id="btn-user-menu" class="text-2xl focus:outline-none" onclick="toggleUserMenu()">👤</button>
        </div>
        <div id="user-menu-dropdown" class="hidden absolute top-14 right-4 bg-white text-gray-800 rounded-lg shadow-xl border w-56 z-20 overflow-hidden">
            <div class="p-4 border-b bg-gray-50">
                <p class="text-xs text-gray-500 mb-1">Đang đăng nhập với:</p>
                <p class="text-sm font-bold truncate" id="menu-user-email">user@email.com</p>
            </div>
            <div class="p-2 flex flex-col gap-1">
                <button id="btn-admin-panel" class="hidden w-full text-left px-4 py-2 text-blue-600 font-semibold hover:bg-blue-50 rounded transition" onclick="showScreen('screen-admin')">⚙️ Admin Dashboard</button>
                <button id="btn-logout" class="w-full text-left px-4 py-2 text-red-600 font-semibold hover:bg-red-50 rounded transition" onclick="handleLogout()">🚪 Đăng xuất ngay</button>
            </div>
        </div>
    </div>

    <div id="screen-login" class="flex-1 flex flex-col items-center justify-center p-6 bg-gray-900 text-white">
        <div class="bg-white p-6 rounded-2xl shadow-xl w-full text-gray-900 text-center relative overflow-hidden">
            <h2 class="text-2xl font-bold mb-2">Hệ Thống Voucher</h2>
            <p class="text-sm text-gray-500 mb-6">Đăng nhập tài khoản hệ thống cấp.</p>
            
            <input type="email" id="input-email" placeholder="Nhập Email" class="w-full border-b-2 border-gray-300 focus:border-blue-500 outline-none p-2 mb-4 text-center">
            <input type="password" id="input-pass" placeholder="Mật khẩu" class="w-full border-b-2 border-gray-300 focus:border-blue-500 outline-none p-2 mb-6 text-center">
            
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition">Đăng Nhập</button>
            <p id="login-error" class="text-red-500 text-sm mt-3 hidden"></p>
        </div>
    </div>

    <div id="screen-list" class="hidden flex-1 p-0 overflow-y-auto pb-24 bg-gray-50">
        <div class="flex bg-white border-b sticky top-0 z-0">
            <button id="tab-active" class="flex-1 py-3 text-center tab-active transition" onclick="switchTab('active')">Chưa dùng <span id="count-active" class="ml-1 text-xs bg-blue-100 text-blue-600 py-0.5 px-2 rounded-full">0</span></button>
            <button id="tab-used" class="flex-1 py-3 text-center tab-inactive transition" onclick="switchTab('used')">Đã dùng <span id="count-used" class="ml-1 text-xs bg-gray-200 text-gray-600 py-0.5 px-2 rounded-full">0</span></button>
        </div>
        <div class="p-4">
            <select id="filter-category" class="w-full text-sm border rounded p-2 mb-4 bg-white" onchange="renderVouchers()">
                <option value="all">Tất cả thương hiệu</option>
                <option value="Katinat">Katinat</option>
                <option value="Shopee">Shopee</option>
                <option value="Khác">Khác</option>
            </select>
            <div id="voucher-list" class="space-y-3"></div>
        </div>
        <button onclick="showScreen('screen-add')" class="fixed bottom-6 right-6 md:right-[calc(50%-210px)] bg-blue-600 text-white w-14 h-14 rounded-full shadow-lg text-3xl flex items-center justify-center hover:bg-blue-700 transition z-10">+</button>
    </div>

    <div id="screen-add" class="hidden flex-1 p-4 bg-gray-50">
        <div class="space-y-4">
            <div>
                <label class="block text-sm text-gray-600 mb-1">Mã Voucher</label>
                <div class="flex relative">
                    <input type="text" id="input-code" placeholder="VD: KATINAT123" class="flex-1 border rounded p-2 w-full uppercase pr-12">
                    <button type="button" onclick="document.getElementById('upload-qr').click()" class="absolute right-0 top-0 h-full px-3 text-gray-600 bg-gray-200 hover:bg-gray-300 border border-l-0 rounded-r transition">📷</button>
                </div>
                <input type="file" id="upload-qr" accept="image/*" class="hidden" onchange="scanImage(event)">
                <p id="scan-status" class="text-xs mt-1 hidden"></p>
            </div>
            <div>
                <label class="block text-sm text-gray-600 mb-1">Phân loại</label>
                <select id="input-category" class="w-full border rounded p-2">
                    <option value="Katinat">Katinat</option>
                    <option value="Shopee">Shopee</option>
                    <option value="Khác">Khác</option>
                </select>
            </div>
            <div>
                <label class="block text-sm text-gray-600 mb-1">Ngày hết hạn</label>
                <input type="date" id="input-expiry" class="w-full border rounded p-2">
            </div>
            <button onclick="addVoucher()" class="w-full bg-gray-900 text-white p-3 rounded font-bold mt-4">Lưu Voucher</button>
        </div>
    </div>

    <div id="screen-detail" class="hidden flex-1 p-0 bg-white flex flex-col">
        <div class="bg-gray-50 p-6 flex flex-col items-center border-b flex-1 relative">
            <span id="detail-category" class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-2"></span>
            <div id="stamp-used" class="hidden absolute top-10 transform -rotate-12 border-4 border-red-500 text-red-500 font-bold text-3xl p-2 rounded uppercase opacity-80 z-20 pointer-events-none">Đã Sử Dụng</div>
            <div id="qrcode" class="mb-4 bg-white p-2 rounded shadow-sm"></div>
            <svg id="barcode" class="mb-2 max-w-full"></svg>
            <p id="detail-code" class="text-2xl font-mono font-bold tracking-widest text-gray-800"></p>
            <p id="detail-expiry" class="text-sm text-gray-500 mt-2 font-medium"></p>
            <button id="btn-mark-used" class="mt-6 bg-red-100 text-red-600 border border-red-300 px-4 py-2 rounded font-bold w-full active:bg-red-200">Đánh dấu đã sử dụng</button>
        </div>
    </div>

    <div id="screen-admin" class="hidden flex-1 p-4 bg-gray-100 overflow-y-auto">
        <div class="bg-white p-4 rounded shadow-sm mb-6 border">
            <h3 class="font-bold text-lg mb-2 text-blue-700">🔒 Quản Lý Thành Viên</h3>
            <p class="text-xs text-gray-500 mb-3">Nhập email, máy chủ Node.js sẽ tự sinh Password ngẫu nhiên mà không lo văng tài khoản Admin.</p>
            
            <div class="flex gap-2 mb-4">
                <input type="email" id="admin-new-user-email" placeholder="Nhập email nhân viên..." class="flex-1 border p-2 rounded text-sm outline-none">
                <button onclick="grantUserAccess()" class="bg-blue-600 text-white px-4 py-2 rounded text-sm font-bold">Tạo User</button>
            </div>
            
            <div class="border-t pt-2 mt-2">
                <h4 class="text-sm font-bold text-gray-700 mb-2">Danh sách thành viên nội bộ:</h4>
                <div id="admin-user-list" class="space-y-2"></div>
            </div>
        </div>

        <div class="bg-white p-4 rounded shadow-sm border">
            <h3 class="font-bold text-lg mb-2 text-gray-800">🎟️ Quản Lý Tất Cả Mã</h3>
            <div class="flex gap-2 mb-4 mt-2">
                <input type="text" id="admin-search" placeholder="Tìm kiếm mã voucher..." class="flex-1 border p-2 rounded text-sm outline-none">
                <button onclick="loadAllVouchersAdmin()" class="bg-gray-800 text-white px-3 py-2 rounded text-sm">Tìm kiếm</button>
            </div>
            <div id="admin-voucher-list" class="space-y-2 text-sm"></div>
        </div>
    </div>
</div>

<script>
    // 🔴 ĐƯỜNG DẪN ĐẾN MÁY CHỦ BACKEND CỦA BẠN 🔴
    const API_URL = "const API_URL = "https://voucher-backend-nqg2.onrender.com"; 
    const ADMIN_EMAIL = "admin@admin.com";

    let vouchers = [];
    let currentVoucherId = null;
    let currentUser = null; // Chứa { id, email } nhận từ backend
    let currentTab = 'active'; 
    const screens = ['screen-login', 'screen-list', 'screen-add', 'screen-detail', 'screen-admin'];

    // QUÉT ẢNH CAMERA
    window.scanImage = function(event) {
        const file = event.target.files[0];
        if (!file) return;
        const statusEl = document.getElementById('scan-status');
        statusEl.className = "text-xs mt-1 text-blue-600 font-medium"; statusEl.innerText = "⏳ Đang phân tích ảnh..."; statusEl.classList.remove('hidden');

        const html5QrCode = new Html5Qrcode("qr-reader-dummy");
        html5QrCode.scanFile(file, true).then(decodedText => {
            document.getElementById('input-code').value = decodedText.toUpperCase();
            statusEl.className = "text-xs mt-1 text-green-600 font-bold"; statusEl.innerText = "✅ Quét thành công!";
            setTimeout(() => statusEl.classList.add('hidden'), 3000);
        }).catch(err => {
            statusEl.className = "text-xs mt-1 text-red-500 font-medium"; statusEl.innerText = "❌ Không tìm thấy mã hợp lệ.";
        });
        event.target.value = ''; 
    };

    // ĐIỀU HƯỚNG UI
    window.toggleUserMenu = function() { document.getElementById('user-menu-dropdown').classList.toggle('hidden'); };
    document.addEventListener('click', (event) => {
        const menu = document.getElementById('user-menu-dropdown'); const btn = document.getElementById('btn-user-menu');
        if (menu && btn && !btn.contains(event.target) && !menu.contains(event.target)) menu.classList.add('hidden');
    });

    window.showScreen = function(screenId) {
        document.getElementById('user-menu-dropdown').classList.add('hidden');
        screens.forEach(id => document.getElementById(id).classList.add('hidden'));
        document.getElementById(screenId).classList.remove('hidden');
        
        const btnBack = document.getElementById('btn-back');
        if (screenId === 'screen-list') {
            btnBack.classList.add('hidden'); document.getElementById('header-title').innerText = 'Ví Voucher';
            loadDataFromBackend();
        } else if (screenId !== 'screen-login') {
            btnBack.classList.remove('hidden'); btnBack.onclick = () => showScreen('screen-list');
            if (screenId === 'screen-add') document.getElementById('header-title').innerText = 'Thêm mới';
            else if (screenId === 'screen-detail') document.getElementById('header-title').innerText = 'Chi tiết';
            else if (screenId === 'screen-admin') {
                document.getElementById('header-title').innerText = 'Admin Dashboard';
                loadUsersAdmin();
                loadAllVouchersAdmin();
            }
        }
    };

    window.switchTab = function(tabName) {
        currentTab = tabName;
        document.getElementById('tab-active').className = `flex-1 py-3 text-center transition ${tabName === 'active' ? 'tab-active' : 'tab-inactive'}`;
        document.getElementById('tab-used').className = `flex-1 py-3 text-center transition ${tabName === 'used' ? 'tab-active' : 'tab-inactive'}`;
        renderVouchers();
    }

    // ==========================================
    // XỬ LÝ ĐĂNG NHẬP (GỌI API BACKEND NODEJS)
    // ==========================================
    window.handleLogin = async function() {
        const email = document.getElementById('input-email').value;
        const password = document.getElementById('input-pass').value;
        const errorEl = document.getElementById('login-error');

        try {
            const response = await fetch(`${API_URL}/api/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await response.json();

            if (!response.ok) {
                errorEl.innerText = data.message; errorEl.classList.remove('hidden'); return;
            }

            // Lưu phiên đăng nhập tạm thời vào bộ nhớ trình duyệt
            currentUser = data;
            sessionStorage.setItem('voucher_user', JSON.stringify(data));

            document.getElementById('header-bar').classList.remove('hidden');
            document.getElementById('menu-user-email').innerText = currentUser.email;
            
            if(currentUser.email === ADMIN_EMAIL) document.getElementById('btn-admin-panel').classList.remove('hidden');
            else document.getElementById('btn-admin-panel').classList.add('hidden');

            showScreen('screen-list');
        } catch (err) {
            errorEl.innerText = "Lỗi kết nối đến máy chủ Backend!"; errorEl.classList.remove('hidden');
        }
    };

    window.handleLogout = function() {
        currentUser = null;
        sessionStorage.removeItem('voucher_user');
        document.getElementById('header-bar').classList.add('hidden');
        document.getElementById('input-pass').value = '';
        showScreen('screen-login');
    };

    // Tự động khôi phục phiên nếu F5 lại trang
    function checkSession() {
        const savedUser = sessionStorage.getItem('voucher_user');
        if (savedUser) {
            currentUser = JSON.parse(savedUser);
            document.getElementById('header-bar').classList.remove('hidden');
            document.getElementById('menu-user-email').innerText = currentUser.email;
            if(currentUser.email === ADMIN_EMAIL) document.getElementById('btn-admin-panel').classList.remove('hidden');
            showScreen('screen-list');
        } else {
            showScreen('screen-login');
        }
    }

    // ==========================================
    // API: QUẢN LÝ VOUCHER KHÁCH / CÁ NHÂN
    // ==========================================
    async function loadDataFromBackend() {
        if (!currentUser) return;
        try {
            const res = await fetch(`${API_URL}/api/vouchers`, {
                headers: { 'user-id': currentUser.id }
            });
            vouchers = await res.json();
            renderVouchers();
        } catch (e) { console.error("Lỗi tải voucher:", e); }
    }

    window.addVoucher = async function() {
        const code = document.getElementById('input-code').value.toUpperCase().trim();
        const category = document.getElementById('input-category').value;
        const expiry = document.getElementById('input-expiry').value;
        if (!code || !expiry) { alert("Vui lòng điền đủ mã và hạn sử dụng!"); return; }

        try {
            const res = await fetch(`${API_URL}/api/vouchers`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'user-id': currentUser.id },
                body: JSON.stringify({ code, category, expiry, userEmail: currentUser.email })
            });
            const data = await res.json();

            if (!res.ok) { alert(data.message); return; }

            document.getElementById('input-code').value = '';
            document.getElementById('input-expiry').value = '';
            currentTab = 'active'; switchTab('active');
            showScreen('screen-list');
        } catch (e) { alert("Lỗi khi kết nối Backend để thêm mã."); }
    };

    window.renderVouchers = function() {
        const listEl = document.getElementById('voucher-list');
        const filter = document.getElementById('filter-category').value;
        listEl.innerHTML = '';

        document.getElementById('count-active').innerText = vouchers.filter(v => v.status === 'active').length;
        document.getElementById('count-used').innerText = vouchers.filter(v => v.status === 'used').length;

        let filtered = vouchers.filter(v => v.status === currentTab);
        if(filter !== 'all') filtered = filtered.filter(v => v.category === filter);

        if (filtered.length === 0) { listEl.innerHTML = '<p class="text-center text-gray-500 mt-10 text-sm">Không có voucher.</p>'; return; }

        filtered.forEach(v => {
            const div = document.createElement('div');
            div.className = `p-4 rounded-lg shadow-sm border bg-white flex justify-between items-center cursor-pointer active:bg-gray-50`;
            div.onclick = () => window.showDetail(v);
            div.innerHTML = `
                <div>
                    <span class="text-xs font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded uppercase">${v.category}</span>
                    <p class="font-mono font-bold text-gray-800 mt-2">${v.code}</p>
                    <p class="text-xs text-gray-500 mt-1">HSD: ${v.expiry}</p>
                </div>
            `;
            listEl.appendChild(div);
        });
    };

    window.showDetail = function(voucher) {
        currentVoucherId = voucher._id;
        showScreen('screen-detail');
        document.getElementById('detail-category').innerText = voucher.category;
        document.getElementById('detail-code').innerText = voucher.code;
        document.getElementById('detail-expiry').innerText = 'HSD: ' + voucher.expiry;
        document.getElementById('qrcode').innerHTML = ''; document.getElementById('barcode').innerHTML = '';
        
        const btnMarkUsed = document.getElementById('btn-mark-used');
        const stampUsed = document.getElementById('stamp-used');
        
        if (voucher.status === 'used') {
            stampUsed.classList.remove('hidden'); btnMarkUsed.classList.add('hidden');
            document.getElementById('qrcode').classList.add('opacity-30');
        } else {
            stampUsed.classList.add('hidden'); btnMarkUsed.classList.remove('hidden');
            document.getElementById('qrcode').classList.remove('opacity-30');
            new QRCode(document.getElementById('qrcode'), { text: voucher.code, width: 150, height: 150 });
            JsBarcode("#barcode", voucher.code, { format: "CODE128", width: 2, height: 60, displayValue: false });
        }

        btnMarkUsed.onclick = async function() {
            if(confirm("Xác nhận đã dùng mã này?")) {
                await fetch(`${API_URL}/api/vouchers/${currentVoucherId}/used`, { method: 'PUT' });
                loadDataFromBackend();
                showScreen('screen-list');
            }
        };
    };

    // ==========================================
    // API BACKEND: DÀNH RIÊNG CHO MÀN HÌNH ADMIN
    // ==========================================
    async function loadUsersAdmin() {
        const listEl = document.getElementById('admin-user-list');
        listEl.innerHTML = '<p class="text-xs text-gray-400">Đang tải thành viên...</p>';
        try {
            const res = await fetch(`${API_URL}/api/admin/users`);
            const users = await res.json();
            listEl.innerHTML = '';
            
            if(users.length === 0) { listEl.innerHTML = '<p class="text-xs text-gray-400">Chưa có tài khoản nào.</p>'; return; }
            
            users.forEach(u => {
                listEl.innerHTML += `
                    <div class="flex justify-between items-center p-2 bg-gray-50 border rounded text-xs">
                        <div>
                            <p class="font-bold text-gray-700">${u.email}</p>
                            <p class="text-blue-600 font-mono mt-0.5">Mật khẩu: <span class="bg-blue-100 font-bold px-1 rounded">${u.password}</span></p>
                        </div>
                        <button onclick="deleteUserAdmin('${u._id}', '${u.email}')" class="bg-red-100 text-red-600 px-2 py-1 rounded font-bold hover:bg-red-200">Xóa User</button>
                    </div>
                `;
            });
        } catch(e) { listEl.innerHTML = '<p class="text-xs text-red-500">Lỗi kết nối API tải user.</p>'; }
    }

    window.grantUserAccess = async function() {
        const emailInput = document.getElementById('admin-new-user-email');
        const email = emailInput.value.toLowerCase().trim();
        if(!email || !email.includes('@')) { alert("Nhập email hợp lệ!"); return; }

        try {
            const res = await fetch(`${API_URL}/api/admin/users`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            const data = await res.json();

            if(!res.ok) { alert(data.message); return; }
            emailInput.value = '';
            loadUsersAdmin();
            alert(`✅ Tạo tài khoản thành công!\n\nEmail: ${data.email}\nMật khẩu: ${data.password}`);
        } catch (e) { alert("Lỗi khi gọi API tạo User."); }
    };

    window.deleteUserAdmin = async function(id, email) {
        if(confirm(`⚠️ CẢNH BÁO: Bạn có chắc chắn muốn xóa tài khoản ${email}?\nHành động này sẽ XÓA VĨNH VIỄN tài khoản và toàn bộ voucher của người này.`)) {
            await fetch(`${API_URL}/api/admin/users/${id}`, { method: 'DELETE' });
            loadUsersAdmin();
            loadAllVouchersAdmin();
        }
    };

    window.loadAllVouchersAdmin = async function() {
        const keyword = document.getElementById('admin-search').value;
        const listEl = document.getElementById('admin-voucher-list');
        listEl.innerHTML = '<p class="text-center text-xs text-gray-400">Đang tải kho mã...</p>';

        try {
            const res = await fetch(`${API_URL}/api/admin/vouchers?keyword=${encodeURIComponent(keyword)}`);
            const allSysVouchers = await res.json();
            listEl.innerHTML = '';

            if(allSysVouchers.length === 0) { listEl.innerHTML = '<p class="text-center text-red-500 text-xs">Không tìm thấy mã nào.</p>'; return; }

            allSysVouchers.forEach(v => {
                const div = document.createElement('div');
                div.className = "p-3 bg-white border rounded shadow-sm flex justify-between items-center text-xs";
                div.innerHTML = `
                    <div>
                        <p class="font-bold font-mono text-blue-700">${v.code} <span class="text-gray-400">(${v.status})</span></p>
                        <p class="text-gray-500 mt-0.5">Của: ${v.userEmail || 'Ẩn danh'}</p>
                    </div>
                    <button onclick="deleteVoucherAdmin('${v._id}')" class="bg-red-500 text-white px-2 py-1 rounded">Xóa mã</button>
                `;
                listEl.appendChild(div);
            });
        } catch (e) { listEl.innerHTML = '<p class="text-center text-red-500 text-xs">Lỗi tải kho voucher.</p>'; }
    };

    window.deleteVoucherAdmin = async function(id) {
        if(confirm("Xóa vĩnh viễn voucher này khỏi tài khoản khách?")) {
            await fetch(`${API_URL}/api/admin/vouchers/${id}`, { method: 'DELETE' });
            loadAllVouchersAdmin();
        }
    };

    // Chạy kiểm tra phiên đăng nhập khi vừa mở trang web
    checkSession();
</script>
</body>
</html>
